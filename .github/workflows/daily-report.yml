name: Codzienny raport viral YouTube Shorts

on:
  schedule:
    # 8:00 czasu polskiego = 6:00 UTC (czas letni CEST, marzec-październik)
    - cron: "0 6 * 3-10 *"
    # 8:00 czasu polskiego = 7:00 UTC (czas zimowy CET, listopad-luty)
    - cron: "0 7 * 11,12,1,2 *"
  workflow_dispatch: {}  # pozwala odpalić ręcznie z zakładki Actions

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Ustawienie Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalacja zależności
        run: pip install -r scripts/requirements.txt

      - name: Generowanie raportu
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/fetch_report.py

      - name: Commit i push wygenerowanych danych
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          git diff --staged --quiet || git commit -m "Aktualizacja raportu $(date -u +%Y-%m-%d)"
          git push

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artefaktu Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy do GitHub Pages
        uses: actions/deploy-pages@v4
